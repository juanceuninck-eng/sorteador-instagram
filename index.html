<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sorteador Gratis de Instagram</title>
  <style>
    :root { --primary: #833ab4; --bg: #f4f6f8; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
    .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    h1 { text-align: center; color: var(--primary); margin-bottom: 25px; }
    
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: bold; margin-bottom: 8px; }
    input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
    
    button[type="submit"] { width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; transition: background 0.2s; }
    button[type="submit"]:hover { background: #6b2897; }
    
    #loader { display: none; text-align: center; margin: 20px 0; font-weight: bold; color: #555; }
    #results { margin-top: 25px; display: none; }
    .winner-card { background: #e8f5e9; border: 1px solid #c8e6c9; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
    .error { color: #d32f2f; background: #ffebee; padding: 12px; border-radius: 6px; display: none; margin-top: 20px; text-align: center; }
  </style>
</head>
<body>

<div class="container">
  <h1>🎁 Sorteador Gratis de Instagram</h1>

  <form id="raffleForm">
    <div class="form-group">
      <label for="postUrl">Enlace de la publicación o Reel:</label>
      <input type="url" id="postUrl" placeholder="https://www.instagram.com/p/C..." required>
    </div>

    <div class="form-group">
      <label for="winnersCount">Cantidad de Ganadores:</label>
      <input type="number" id="winnersCount" value="1" min="1" max="10">
    </div>

    <div class="form-group">
      <label for="minMentions">Menciones Mínimas por Comentario (@):</label>
      <input type="number" id="minMentions" value="0" min="0" max="5">
    </div>

    <button type="submit" id="submitBtn">¡Cargar Comentarios y Sortear!</button>
  </form>

  <div id="loader">
    <p>⏳ Obteniendo comentarios de Instagram y eligiendo ganadores...</p>
  </div>

  <div id="errorBox" class="error"></div>

  <div id="results">
    <h2>🎉 ¡Ganadores!</h2>
    <div id="winnersList"></div>
  </div>
</div>

<script>
  document.getElementById('raffleForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const postUrl = document.getElementById('postUrl').value.trim();
    const winnersCount = document.getElementById('winnersCount').value;
    const minMentions = document.getElementById('minMentions').value;
    
    const loader = document.getElementById('loader');
    const results = document.getElementById('results');
    const winnersList = document.getElementById('winnersList');
    const errorBox = document.getElementById('errorBox');
    const submitBtn = document.getElementById('submitBtn');

    loader.style.display = 'block';
    errorBox.style.display = 'none';
    results.style.display = 'none';
    submitBtn.disabled = true;

    try {
      const response = await fetch('https://sorteador-instagram.onrender.com/api/sortear-link', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          postUrl: postUrl,
          winnersCount: parseInt(winnersCount),
          minMentions: parseInt(minMentions)
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || 'Ocurrió un error inesperado al procesar la publicación.');
      }

      winnersList.innerHTML = '';
      data.winners.forEach((winner, idx) => {
        winnersList.innerHTML += `
          <div class="winner-card">
            <strong>🏆 Ganador #${idx + 1}:</strong> @${winner.username}
            <br><small>"${winner.text}"</small>
          </div>
        `;
      });

      results.style.display = 'block';

    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.style.display = 'block';
    } finally {
      loader.style.display = 'none';
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
