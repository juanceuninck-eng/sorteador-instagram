<textarea id="comentarios" rows="10" placeholder="usuario1: comentario aquí&#10;usuario2: otro comentario"></textarea>
<input id="winnersCount" type="number" value="1" min="1">
<button onclick="sortear()">Sortear</button>
<div id="resultado"></div>

<script>
async function sortear() {
  const comentariosTexto = document.getElementById('comentarios').value;
  const winnersCount = document.getElementById('winnersCount').value;

  const res = await fetch('https://sorteador-instagram.onrender.com/api/sortear-manual', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ comentariosTexto, winnersCount })
  });

  const data = await res.json();
  if (data.success) {
    document.getElementById('resultado').innerText =
      'Ganadores: ' + data.winners.map(w => w.username).join(', ');
  } else {
    document.getElementById('resultado').innerText = 'Error: ' + data.error;
  }
}
</script>
